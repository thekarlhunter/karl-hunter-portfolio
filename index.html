<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Karl Hunter</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <meta property="og:title" content="Karl Hunter">
  <meta property="og:description" content="Designing, writing, filming, and making things for the internet.">
  <meta property="og:image" content="https://karlhunter.com/og-image.jpg">
  <meta property="og:url" content="https://karlhunter.com">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --text-secondary: #888888;
      --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    html {
      font-size: 16px;
      scrollbar-gutter: stable;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .card {
      min-height: 100vh;
      padding: 32px 40px 40px;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 80px;
    }

    .logo {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .nav-link {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      transition: opacity 0.3s ease;
    }

    .nav-link:hover {
      opacity: 0.5;
    }

    /* ── Hero ── */
    .hero {
      flex: 1;
    }

    .hero-name {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: -0.01em;
    }

    .hero-bio {
      font-size: 14px;
      line-height: 17px;
      color: var(--text-secondary);
      font-weight: 500;
      margin-bottom: 24px;
    }

    .hero-links {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .hero-link {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      transition: opacity 0.3s ease;
      width: fit-content;
    }

    .hero-link:hover {
      opacity: 0.4;
    }

    .hero-link-label {
      color: var(--text-secondary);
      min-width: 56px;
    }

    /* ── Footer ── */
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 100px;
    }

    .footer-copyright {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 400;
    }

    .footer-links {
      display: flex;
      gap: 24px;
    }

    .footer-link {
      font-size: 13px;
      font-weight: 400;
      color: var(--text);
      transition: opacity 0.3s ease;
    }

    .footer-link:hover {
      opacity: 0.5;
    }

    @media (max-width: 768px) {
      .card {
        padding: 24px 20px 32px;
      }

      .header {
        margin-bottom: 60px;
      }

      .footer {
        flex-direction: column;
        gap: 20px;
        align-items: flex-start;
        margin-top: 60px;
      }

      .footer-links {
        flex-wrap: wrap;
        gap: 16px;
      }
    }
  </style>
</head>
<body>

  <div class="card">

    <header class="header">
      <a href="/" class="logo">KH</a>
      <a href="work-with-me.html" class="nav-link">Work With Me</a>
    </header>

    <section class="hero">
      <h1 class="hero-name">Karl Hunter</h1>
      <p class="hero-bio">Designing, writing, filming, and making things for the internet.</p>
      <nav class="hero-links">
        <a href="https://letters.karlhunter.com/" target="_blank" rel="noopener" class="hero-link">
          <span class="hero-link-label">Writing</span>letters.karlhunter.com
        </a>
        <a href="https://youtube.com/@karlhunter/" target="_blank" rel="noopener" class="hero-link">
          <span class="hero-link-label">Videos</span>youtube.com/@karlhunter
        </a>
        <a href="https://creativemarket.com/khstudio" target="_blank" rel="noopener" class="hero-link">
          <span class="hero-link-label">Fonts</span>creativemarket.com/khstudio
        </a>
      </nav>
    </section>

    <footer class="footer">
      <span class="footer-copyright">&copy; 2026 Karl Hunter</span>
      <nav class="footer-links">
        <a href="https://x.com/thekarlhunter" target="_blank" rel="noopener" class="footer-link">Twitter (X)</a>
        <a href="https://www.instagram.com/thekarlhunter/" target="_blank" rel="noopener" class="footer-link">Instagram</a>
        <a href="https://letters.karlhunter.com/" target="_blank" rel="noopener" class="footer-link">Substack</a>
        <a href="https://youtube.com/@karlhunter/" target="_blank" rel="noopener" class="footer-link">YouTube</a>
      </nav>
    </footer>

  </div>

</body>
</html>
