<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oslo Dance Company — Karl Hunter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #ffffff; --text: #1a1a1a; --text-secondary: #888888; --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); -webkit-font-smoothing: antialiased; min-height: 100vh; }
    a { color: inherit; text-decoration: none; }
    .page { min-height: 100vh; padding: 32px 40px 40px; display: flex; flex-direction: column; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 80px; }
    .logo { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
    .back-link { font-size: 14px; font-weight: 500; color: var(--text-secondary); transition: color 0.3s ease; }
    .back-link:hover { color: var(--text); }
    .project-content { display: grid; grid-template-columns: 280px 1fr; gap: 48px; align-items: start; flex: 1; }
    .project-info { position: sticky; top: 32px; }
    .project-title { font-size: 15px; font-weight: 600; margin-bottom: 16px; letter-spacing: -0.01em; }
    .project-description { font-size: 14px; letter-spacing: 0em; line-height: 17px; color: var(--text-secondary); font-weight: 500; margin-bottom: 24px; }
    .project-meta { display: flex; flex-direction: column; gap: 12px; padding-top: 24px; border-top: 1px solid #e5e5e5; }
    .meta-item { display: flex; flex-direction: column; gap: 2px; }
    .meta-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary); }
    .meta-value { font-size: 14px; font-weight: 500; color: var(--text); }
    .project-gallery { display: flex; flex-direction: column; gap: 16px; }
    .gallery-image { width: 100%; overflow: hidden; background: #e8e8e8; }
    .gallery-image img { width: 100%; display: block; object-fit: cover; }
    .gallery-image.hero-img { aspect-ratio: 16/9; }
    .gallery-image.portrait { aspect-ratio: 3/4; }
    .gallery-image.square { aspect-ratio: 1/1; }
    .gallery-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .footer { display: flex; justify-content: space-between; align-items: center; margin-top: 100px; }
    .footer-copyright { font-size: 13px; color: var(--text-secondary); }
    .footer-links { display: flex; gap: 24px; }
    .footer-link { font-size: 13px; color: var(--text); transition: opacity 0.3s ease; }
    .footer-link:hover { opacity: 0.5; }
    @media (max-width: 768px) {
      .page { padding: 24px 20px 32px; }
      .project-content { grid-template-columns: 1fr; gap: 32px; }
      .project-info { position: static; }
      .gallery-row { grid-template-columns: 1fr; }
      .footer { flex-direction: column; gap: 20px; align-items: flex-start; margin-top: 60px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <a href="index.html" class="logo">KH</a>
      <a href="index.html" class="back-link">&larr; Back</a>
    </header>
    <div class="project-content">
      <aside class="project-info">
        <h1 class="project-title">Oslo Dance Company</h1>
        <p class="project-description">Brand identity and visual direction for Oslo Dance Company, a contemporary dance collective pushing the boundaries of movement and performance art.</p>
        <div class="project-meta">
          <div class="meta-item">
            <span class="meta-label">Role</span>
            <span class="meta-value">Brand Identity &amp; Direction</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Year</span>
            <span class="meta-value">2024</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Category</span>
            <span class="meta-value">Branding</span>
          </div>
        </div>
      </aside>
      <div class="project-gallery">
        <div class="gallery-image hero-img">
          <img src="https://images.unsplash.com/photo-1508700929628-666bc8bd84ea?w=1200&h=675&fit=crop" alt="Oslo Dance Company">
        </div>
        <div class="gallery-row">
          <div class="gallery-image square">
            <img src="https://images.unsplash.com/photo-1508700929628-666bc8bd84ea?w=600&h=600&fit=crop&crop=top" alt="Oslo Dance detail">
          </div>
          <div class="gallery-image square">
            <img src="https://images.unsplash.com/photo-1508700929628-666bc8bd84ea?w=600&h=600&fit=crop&crop=bottom" alt="Oslo Dance detail">
          </div>
        </div>
        <div class="gallery-image portrait">
          <img src="https://images.unsplash.com/photo-1508700929628-666bc8bd84ea?w=1200&h=1600&fit=crop" alt="Oslo Dance Company">
        </div>
      </div>
    </div>
    <footer class="footer">
      <span class="footer-copyright">&copy; 2026 Karl Hunter</span>
      <nav class="footer-links">
        <a href="https://x.com/" target="_blank" rel="noopener" class="footer-link">Twitter (X)</a>
        <a href="https://www.instagram.com/" target="_blank" rel="noopener" class="footer-link">Instagram</a>
        <a href="#" class="footer-link">Substack</a>
        <a href="#" class="footer-link">YouTube</a>
      </nav>
    </footer>
  </div>
</body>
</html>
